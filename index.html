# Juego-matem-ticas
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero Equipos PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(#0f2027,#203a43,#000);
    color:white;
    text-align:center;
}

.tablero{
    display:grid;
    grid-template-columns: repeat(5,60px);
    gap:10px;
    justify-content:center;
    margin-top:20px;
}

.casilla{
    width:60px;
    height:60px;
    background:#222;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* EQUIPOS */
.equipo1{ background:#00ffcc !important; color:black; }
.equipo2{ background:#ff4d4d !important; }

.box{ margin-top:20px; }

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

#turno{
    font-size:20px;
    margin-top:10px;
}

#proceso{
    margin-top:10px;
    color:#00ffcc;
}
</style>
</head>

<body>

<h1>🎲 Tablero Matemático PRO+ (Equipos)</h1>

<div id="turno">Turno: Equipo 1 🟢</div>

<div class="tablero" id="tablero"></div>

<div class="box">
    <p id="pregunta"></p>
    <div id="proceso"></div>
    <input type="number" id="respuesta" placeholder="Resultado">
    <br>
    <button onclick="verificar()">Responder</button>
    <p id="mensaje"></p>
</div>

<script>
let pos1 = 0;
let pos2 = 0;
let turno = 1;
let totalCasillas = 20;
let actualIndex = -1;

/* PREGUNTAS */
let preguntas = [
    {p:"(12 ÷ 3) × 5", r:20},
    {p:"√81", r:9, proceso:"√81 = √(9×9) = ?"},
    {p:"3² + 4", r:13},
    {p:"1/2 + 1/2", r:1},
    {p:"Área cuadrado lado 6", r:36},
    {p:"√49", r:7, proceso:"√49 = √(7×7) = ?"},
    {p:"10×3 − 5", r:25},
    {p:"2/3 + 1/3", r:1},
    {p:"(8×5)−10", r:30},
    {p:"√64", r:8, proceso:"√64 = √(8×8) = ?"}
];

/* TABLERO */
function crearTablero(){
    let t = document.getElementById("tablero");
    for(let i=0;i<totalCasillas;i++){
        let d = document.createElement("div");
        d.classList.add("casilla");
        d.id="c"+i;
        d.innerText=i+1;
        t.appendChild(d);
    }
    actualizar();
}

function actualizar(){
    document.querySelectorAll(".casilla").forEach(c=>{
        c.classList.remove("equipo1","equipo2");
    });

    document.getElementById("c"+pos1).classList.add("equipo1");
    document.getElementById("c"+pos2).classList.add("equipo2");

    document.getElementById("turno").innerText =
        turno==1 ? "Turno: Equipo 1 🟢" : "Turno: Equipo 2 🔴";
}

/* PREGUNTA DIFERENTE SIEMPRE */
function cargarPregunta(){
    let index;
    do{
        index = Math.floor(Math.random()*preguntas.length);
    }while(index === actualIndex);

    actualIndex = index;
    let q = preguntas[index];
    window.actual = q;

    document.getElementById("pregunta").innerText="Resuelve: " + q.p;

    if(q.proceso){
        document.getElementById("proceso").innerText="💡 " + q.proceso;
    } else {
        document.getElementById("proceso").innerText="";
    }
}

/* VERIFICAR */
function verificar(){
    let r = document.getElementById("respuesta").value;

    if(r == actual.r){
        if(turno==1){ pos1++; }
        else{ pos2++; }

        document.getElementById("mensaje").innerText="✅ Correcto!";
    } else {
        if(turno==1){ pos1 = Math.max(0,pos1-1); }
        else{ pos2 = Math.max(0,pos2-1); }

        document.getElementById("mensaje").innerText="❌ Fallaste! Nueva pregunta...";
    }

    if(pos1 >= totalCasillas-1){
        ganar("Equipo 1 🟢");
        return;
    }
    if(pos2 >= totalCasillas-1){
        ganar("Equipo 2 🔴");
        return;
    }

    turno = turno==1 ? 2 : 1;

    actualizar();
    document.getElementById("respuesta").value="";
    cargarPregunta(); // 🔥 SIEMPRE cambia (clave de lo que pediste)
}

function ganar(eq){
    document.getElementById("pregunta").innerText = "🏆 GANA " + eq;
    document.getElementById("proceso").innerText="";
}

crearTablero();
cargarPregunta();
</script>

</body>
</html>
